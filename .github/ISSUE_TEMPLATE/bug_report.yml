name: Bug report
description: Report a sanitized workflow or media processing problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste Telegram tokens, cookies, private URLs, or full raw logs.

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      description: Which workflow failed?
      options:
        - remote-media.yml
        - youtube-video-local-api.yml
        - tiktok-direct-local-api.yml
        - facebook-long-video-local-api.yml
        - other / not sure
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Source platform
      options:
        - YouTube
        - TikTok
        - Facebook
        - Instagram
        - X / Twitter
        - Reddit
        - Direct file URL
        - Other
    validations:
      required: true

  - type: input
    id: quality
    attributes:
      label: Requested quality
      placeholder: "auto / 1080 / 720 / 480"

  - type: dropdown
    id: send_mode
    attributes:
      label: Send mode
      options:
        - video
        - document
        - not sure
    validations:
      required: true

  - type: dropdown
    id: cookies
    attributes:
      label: Were cookies enabled?
      options:
        - "Yes — cookies were enabled"
        - "No — cookies were not enabled"
        - "Not applicable"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: sanitized_error
    attributes:
      label: Sanitized error message
      description: Remove URLs, tokens, cookies, chat IDs, and private filenames.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Do not include secrets or private links.
