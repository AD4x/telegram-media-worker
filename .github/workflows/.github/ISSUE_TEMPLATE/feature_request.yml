name: Feature request
description: Suggest a new platform, mode, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest improvements without sharing private URLs, cookies, or tokens.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New platform support
        - Existing platform improvement
        - Telegram sending
        - Document mode
        - Workflow inputs
        - Docker image
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: This request does not include tokens, cookies, or private media URLs.
          required: true
