name: Remote Media To Telegram

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: "Media URL"
        required: true
        type: string
      max_height:
        description: "Max height"
        required: true
        default: "auto"
        type: choice
        options:
          - "auto"
          - "2160"
          - "1440"
          - "1080"
          - "720"
          - "480"
          - "360"

permissions:
  contents: read
  packages: read

jobs:
  download_and_send:
    name: Download and send first success
    runs-on: ubuntu-latest
    timeout-minutes: 12

    container:
      image: ghcr.io/ad4x/tg-video-worker:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Download and send to Telegram
        env:
          YOUTUBE_COOKIES_TXT: ${{ secrets.YOUTUBE_COOKIES_TXT }}
          FACEBOOK_COOKIES_TXT: ${{ secrets.FACEBOOK_COOKIES_TXT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e

          mkdir -p work

          SOURCE_URL="${{ inputs.media_url }}"
          MAX_HEIGHT="${{ inputs.max_height }}"
          MAX_FILE_BYTES="50000000"
          CONCURRENT_FRAGMENTS="4"

          if [ "$MAX_HEIGHT" = "auto" ]; then
            AUTO_MODE="1"
            MAX_HEIGHT_NUM="2160"
          else
            AUTO_MODE="0"
            MAX_HEIGHT_NUM="$MAX_HEIGHT"
          fi

          echo "yt-dlp version:"
          python3 -m yt_dlp --version

          echo "Deno version:"
          deno --version || true

          echo "ffmpeg version:"
          ffmpeg -version | head -n 1

          if [ -z "$SOURCE_URL" ]; then
            echo "ERROR: Missing media_url."
            exit 1
          fi

          if [ -z "${TELEGRAM_TOKEN:-}" ]; then
            echo "ERROR: Missing TELEGRAM_TOKEN secret."
            exit 1
          fi

          if [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "ERROR: Missing TELEGRAM_CHAT_ID secret."
            exit 1
          fi

          WORK_URL="$SOURCE_URL"
          VIDEO_ID=""
          PLATFORM="generic"
          IS_YOUTUBE="0"
          IS_FACEBOOK="0"
          REFERER_URL="https://www.google.com/"

          LOWER_URL="$(printf "%s" "$SOURCE_URL" | tr "[:upper:]" "[:lower:]")"

          if echo "$LOWER_URL" | grep -Eq "(youtube\.com|youtu\.be)"; then
            PLATFORM="youtube"
            IS_YOUTUBE="1"
            REFERER_URL="https://www.youtube.com/"

            if echo "$SOURCE_URL" | grep -Eq "youtube\.com/shorts/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtube\.com/shorts/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "youtu\.be/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtu\.be/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "[?&]v=[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*[?&]v=([A-Za-z0-9_-]+).*#\1#p')"
            fi

            if [ -n "$VIDEO_ID" ]; then
              WORK_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            fi
          elif echo "$LOWER_URL" | grep -Eq "(facebook\.com|fb\.watch)"; then
            PLATFORM="facebook"
            IS_FACEBOOK="1"
            REFERER_URL="https://www.facebook.com/"
          elif echo "$LOWER_URL" | grep -Eq "(instagram\.com)"; then
            PLATFORM="instagram"
            REFERER_URL="https://www.instagram.com/"
          elif echo "$LOWER_URL" | grep -Eq "(tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com)"; then
            PLATFORM="tiktok"
            REFERER_URL="https://www.tiktok.com/"
          elif echo "$LOWER_URL" | grep -Eq "(twitter\.com|x\.com)"; then
            PLATFORM="x"
            REFERER_URL="https://x.com/"
          elif echo "$LOWER_URL" | grep -Eq "(reddit\.com|redd\.it)"; then
            PLATFORM="reddit"
            REFERER_URL="https://www.reddit.com/"
          fi

          echo "PLATFORM=${PLATFORM}"
          echo "ORIGINAL_URL=${SOURCE_URL}"
          echo "NORMALIZED_URL=${WORK_URL}"
          echo "MAX_HEIGHT=${MAX_HEIGHT}"
          echo "MAX_HEIGHT_NUM=${MAX_HEIGHT_NUM}"
          echo "AUTO_MODE=${AUTO_MODE}"
          echo "REFERER_URL=${REFERER_URL}"

          COOKIES_ARGS=()

          if [ "$IS_YOUTUBE" = "1" ] && [ -n "${YOUTUBE_COOKIES_TXT:-}" ]; then
            COOKIES_FILE="$RUNNER_TEMP/youtube-cookies.txt"
            umask 077
            printf '%s\n' "$YOUTUBE_COOKIES_TXT" > "$COOKIES_FILE"
            sed -i 's/\r$//' "$COOKIES_FILE"

            COOKIE_BYTES="$(wc -c < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_LINES="$(wc -l < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_DOMAIN_LINES="$(grep -Ei 'youtube\.com|google\.com|accounts\.google\.com' "$COOKIES_FILE" | wc -l | tr -d ' ')"
            COOKIE_HAS_NETSCAPE="$(grep -E '^# Netscape HTTP Cookie File' "$COOKIES_FILE" >/dev/null 2>&1 && echo yes || echo no)"

            COOKIES_ARGS=(--cookies "$COOKIES_FILE")

            echo "YOUTUBE_COOKIES=enabled"
            echo "COOKIE_BYTES=${COOKIE_BYTES}"
            echo "COOKIE_LINES=${COOKIE_LINES}"
            echo "COOKIE_YOUTUBE_OR_GOOGLE_LINES=${COOKIE_DOMAIN_LINES}"
            echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"
          elif [ "$IS_FACEBOOK" = "1" ] && [ -n "${FACEBOOK_COOKIES_TXT:-}" ]; then
            COOKIES_FILE="$RUNNER_TEMP/facebook-cookies.txt"
            umask 077
            printf '%s\n' "$FACEBOOK_COOKIES_TXT" > "$COOKIES_FILE"
            sed -i 's/\r$//' "$COOKIES_FILE"

            COOKIE_BYTES="$(wc -c < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_LINES="$(wc -l < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_DOMAIN_LINES="$(grep -Ei 'facebook\.com|fbcdn\.net|messenger\.com' "$COOKIES_FILE" | wc -l | tr -d ' ')"
            COOKIE_HAS_NETSCAPE="$(grep -E '^# Netscape HTTP Cookie File' "$COOKIES_FILE" >/dev/null 2>&1 && echo yes || echo no)"

            COOKIES_ARGS=(--cookies "$COOKIES_FILE")

            echo "FACEBOOK_COOKIES=enabled"
            echo "COOKIE_BYTES=${COOKIE_BYTES}"
            echo "COOKIE_LINES=${COOKIE_LINES}"
            echo "COOKIE_FACEBOOK_LINES=${COOKIE_DOMAIN_LINES}"
            echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"
          else
            if [ "$IS_YOUTUBE" = "1" ]; then
              echo "YOUTUBE_COOKIES=disabled"
            elif [ "$IS_FACEBOOK" = "1" ]; then
              echo "FACEBOOK_COOKIES=disabled"
            else
              echo "SITE_COOKIES=disabled"
            fi
          fi

          HEIGHTS=""

          if [ "$MAX_HEIGHT_NUM" -ge 2160 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 2160"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 1440 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1440"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 1080 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1080"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 720 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 720"
          fi

          if [ "$MAX_HEIGHT_NUM" -ge 480 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 480"
          fi

          HEIGHTS="$HEIGHTS 360"

          echo "HEIGHTS=${HEIGHTS}"

          send_to_telegram() {
            local file_path="$1"
            local success_height="$2"
            local attempt_label="$3"

            if [ ! -f "$file_path" ]; then
              echo "ERROR: Telegram send file is missing."
              return 1
            fi

            local size_bytes
            size_bytes="$(stat -c%s "$file_path")"

            if [ "$size_bytes" -le 0 ]; then
              echo "ERROR: File is empty."
              return 1
            fi

            if [ "$size_bytes" -gt "$MAX_FILE_BYTES" ]; then
              echo "SKIP: File is larger than limit. SIZE_BYTES=${size_bytes}"
              return 2
            fi

            echo "SENDING_TO_TELEGRAM=1"
            echo "SELECTED_FILE=${file_path}"
            echo "SELECTED_HEIGHT=${success_height}"
            echo "SELECTED_ATTEMPT=${attempt_label}"
            echo "SELECTED_SIZE_BYTES=${size_bytes}"

            local response_file
            response_file="$RUNNER_TEMP/telegram-response.json"

            local http_code
            http_code="$(
              curl -sS \
                -o "$response_file" \
                -w "%{http_code}" \
                -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "supports_streaming=true" \
                -F "video=@${file_path}"
            )"

            echo "TELEGRAM_HTTP_CODE=${http_code}"

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "Telegram send failed."
              cat "$response_file" || true
              return 1
            fi

            if grep -q '"ok":true' "$response_file"; then
              echo "TELEGRAM_SEND=success"
              echo "FINAL_RESULT=success"
              return 0
            fi

            echo "Telegram response did not contain ok=true."
            cat "$response_file" || true
            return 1
          }

          is_dns_failure_log() {
            local log_file="$1"

            grep -Eqi "Failed to resolve|Address family for hostname not supported|Temporary failure in name resolution|Name or service not known" "$log_file"
          }

          handle_downloaded_file() {
            local file_path="$1"
            local success_height="$2"
            local attempt_label="$3"

            if [ ! -f "$file_path" ]; then
              return 1
            fi

            local size_bytes
            size_bytes="$(stat -c%s "$file_path")"

            if [ "$size_bytes" -le 0 ]; then
              echo "Downloaded file is empty."
              return 1
            fi

            echo "DOWNLOAD_SUCCESS=1"
            echo "DOWNLOAD_SUCCESS_HEIGHT=${success_height}"
            echo "DOWNLOAD_SUCCESS_ATTEMPT=${attempt_label}"
            echo "DOWNLOAD_SIZE_BYTES=${size_bytes}"

            set +e
            send_to_telegram "$file_path" "$success_height" "$attempt_label"
            local send_rc=$?
            set -e

            if [ "$send_rc" -eq 0 ]; then
              exit 0
            fi

            if [ "$send_rc" -eq 2 ]; then
              echo "Downloaded file exceeded Telegram limit. Trying a lower or alternate format."
              return 2
            fi

            echo "Telegram send failed after successful download."
            exit 1
          }

          try_download() {
            set +e

            local attempt_label="$1"
            local height="$2"
            local format_selector="$3"
            shift 3

            local extra_args=("$@")
            local log_file="work/yt-dlp-${attempt_label}-${height}.log"

            echo ""
            echo "=============================="
            echo "ATTEMPT=${attempt_label}"
            echo "TRY_HEIGHT=${height}"
            echo "FORMAT_SELECTOR=${format_selector}"
            echo "=============================="

            rm -f work/video.*

            python3 -m yt_dlp \
              --no-playlist \
              --no-warnings \
              --geo-bypass \
              --socket-timeout 10 \
              --retries 0 \
              --fragment-retries 0 \
              --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
              --merge-output-format mp4 \
              --remux-video mp4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              --max-filesize 47M \
              -f "$format_selector" \
              -o "work/video.%(ext)s" \
              "${COOKIES_ARGS[@]}" \
              "${extra_args[@]}" \
              "$WORK_URL" > "$log_file" 2>&1
            local rc=$?

            cat "$log_file"

            if is_dns_failure_log "$log_file"; then
              echo "DNS_DOWNLOAD_FAILURE=1"
              echo "DNS failure detected. Skipping remaining heights for this client."
              return 90
            fi

            local file_path
            file_path="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

            if [ "$rc" -eq 0 ] && [ -n "$file_path" ] && [ -f "$file_path" ]; then
              handle_downloaded_file "$file_path" "$height" "$attempt_label"
              return $?
            fi

            echo "DOWNLOAD_FAILED=1"
            echo "ATTEMPT=${attempt_label}"
            echo "HEIGHT=${height}"
            echo "RC=${rc}"

            return 1
          }

          try_sorted_download() {
            set +e

            local attempt_label="$1"
            local sort_expr="$2"
            shift 2

            local extra_args=("$@")
            local log_file="work/yt-dlp-${attempt_label}.log"

            echo ""
            echo "=============================="
            echo "ATTEMPT=${attempt_label}"
            echo "SORT_EXPR=${sort_expr}"
            echo "=============================="

            rm -f work/video.*

            python3 -m yt_dlp \
              --no-playlist \
              --no-warnings \
              --geo-bypass \
              --socket-timeout 10 \
              --retries 0 \
              --fragment-retries 0 \
              --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
              --merge-output-format mp4 \
              --remux-video mp4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              --max-filesize 47M \
              -S "$sort_expr" \
              -o "work/video.%(ext)s" \
              "${COOKIES_ARGS[@]}" \
              "${extra_args[@]}" \
              "$WORK_URL" > "$log_file" 2>&1
            local rc=$?

            cat "$log_file"

            if is_dns_failure_log "$log_file"; then
              echo "DNS_DOWNLOAD_FAILURE=1"
              echo "DNS failure detected in sorted fallback."
              return 90
            fi

            local file_path
            file_path="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

            if [ "$rc" -eq 0 ] && [ -n "$file_path" ] && [ -f "$file_path" ]; then
              handle_downloaded_file "$file_path" "sorted" "$attempt_label"
              return $?
            fi

            echo "DOWNLOAD_FAILED=1"
            echo "ATTEMPT=${attempt_label}"
            echo "RC=${rc}"

            return 1
          }

          if [ "$IS_YOUTUBE" = "1" ]; then
            echo "MODE=youtube"

            for CLIENT in default tv web_safari; do
              EXTRA_ARGS=()

              case "$CLIENT" in
                default)
                  ATTEMPT_LABEL="youtube-default-deno"
                  ;;
                tv)
                  ATTEMPT_LABEL="youtube-tv-deno"
                  EXTRA_ARGS+=(--extractor-args "youtube:player_client=tv")
                  ;;
                web_safari)
                  ATTEMPT_LABEL="youtube-web-safari-deno"
                  EXTRA_ARGS+=(--extractor-args "youtube:player_client=web_safari")
                  ;;
              esac

              echo ""
              echo "YOUTUBE_CLIENT=${CLIENT}"

              for HEIGHT in $HEIGHTS; do
                FORMAT_SELECTOR="bv*[ext=mp4][vcodec^=avc1][height<=${HEIGHT}]+ba[ext=m4a]/bv*[ext=mp4][height<=${HEIGHT}]+ba[ext=m4a]/b[ext=mp4][height<=${HEIGHT}]/bv*[height<=${HEIGHT}]+ba/b[height<=${HEIGHT}]/b/best"

                set +e
                try_download "$ATTEMPT_LABEL" "$HEIGHT" "$FORMAT_SELECTOR" "${EXTRA_ARGS[@]}"
                TRY_RC=$?
                set -e

                if [ "$TRY_RC" -eq 90 ]; then
                  echo "DNS failure for ${CLIENT}. Moving to next YouTube client."
                  break
                fi
              done
            done
          else
            echo "MODE=generic"

            GENERIC_DNS_FAILED=0

            for HEIGHT in $HEIGHTS; do
              FORMAT_SELECTOR="bestvideo[ext=mp4][height<=${HEIGHT}]+bestaudio[ext=m4a]/best[ext=mp4][height<=${HEIGHT}]/bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/bestvideo+bestaudio/best"

              set +e
              try_download "generic-primary" "$HEIGHT" "$FORMAT_SELECTOR"
              TRY_RC=$?
              set -e

              if [ "$TRY_RC" -eq 90 ]; then
                echo "DNS failure in generic primary. Skipping remaining generic heights."
                GENERIC_DNS_FAILED=1
                break
              fi
            done

            if [ "$GENERIC_DNS_FAILED" -ne 1 ]; then
              echo ""
              echo "GENERIC_SMART_FALLBACK=1"

              set +e
              try_sorted_download "generic-wide-best" "ext:mp4:m4a"
              GWB_RC=$?
              set -e

              if [ "$GWB_RC" -eq 90 ]; then
                echo "DNS failure in generic wide fallback."
                GENERIC_DNS_FAILED=1
              fi
            fi

            if [ "$GENERIC_DNS_FAILED" -ne 1 ]; then
              echo ""
              echo "GENERIC_CAPPED_FALLBACK=1"

              if [ "$AUTO_MODE" = "1" ]; then
                SORT_EXPR="ext:mp4:m4a"
              else
                SORT_EXPR="res:${MAX_HEIGHT_NUM},ext:mp4:m4a"
              fi

              set +e
              try_sorted_download "generic-capped-fallback" "$SORT_EXPR"
              GCF_RC=$?
              set -e

              if [ "$GCF_RC" -eq 90 ]; then
                echo "DNS failure in generic capped fallback."
              fi
            fi
          fi

          echo "FINAL_RESULT=failed"
          echo "No working download method succeeded."
          exit 1
