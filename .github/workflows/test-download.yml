name: Test Remote Media Download

on:
  workflow_dispatch:
    inputs:
      media_url:
        description: "Media URL"
        required: true
        type: string
      max_height:
        description: "Max height"
        required: true
        default: "1080"
        type: choice
        options:
          - "2160"
          - "1440"
          - "1080"
          - "720"
          - "480"
          - "360"

jobs:
  probe_video:
    name: Probe video slot ${{ matrix.slot }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2, 3, 4]

    steps:
      - name: Install tools
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg ca-certificates
          python3 -m pip install --user --no-cache-dir --upgrade --pre yt-dlp

          echo "yt-dlp version:"
          python3 -m yt_dlp --version

      - name: Download media
        shell: bash
        env:
          YOUTUBE_COOKIES_TXT: ${{ secrets.YOUTUBE_COOKIES_TXT }}
        run: |
          set -e

          mkdir -p work

          SLOT="${{ matrix.slot }}"
          SOURCE_URL="${{ inputs.media_url }}"
          MAX_HEIGHT="${{ inputs.max_height }}"
          MAX_FILE_BYTES="50000000"
          CONCURRENT_FRAGMENTS="4"

          STATUS_FILE="work/status-${SLOT}.txt"

          {
            echo "SLOT=${SLOT}"
            echo "MAX_HEIGHT=${MAX_HEIGHT}"
          } > "$STATUS_FILE"

          if [ -z "$SOURCE_URL" ]; then
            echo "Missing media_url."
            echo "RESULT=failed" >> "$STATUS_FILE"
            echo "REASON=missing_media_url" >> "$STATUS_FILE"
            exit 0
          fi

          WORK_URL="$SOURCE_URL"
          VIDEO_ID=""
          PLATFORM="generic"
          IS_YOUTUBE="0"
          REFERER_URL="https://www.google.com/"

          LOWER_URL="$(printf "%s" "$SOURCE_URL" | tr "[:upper:]" "[:lower:]")"

          if echo "$LOWER_URL" | grep -Eq "(youtube\.com|youtu\.be)"; then
            PLATFORM="youtube"
            IS_YOUTUBE="1"
            REFERER_URL="https://www.youtube.com/"

            if echo "$SOURCE_URL" | grep -Eq "youtube\.com/shorts/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtube\.com/shorts/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "youtu\.be/[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*youtu\.be/([A-Za-z0-9_-]+).*#\1#p')"
            elif echo "$SOURCE_URL" | grep -Eq "[?&]v=[A-Za-z0-9_-]+"; then
              VIDEO_ID="$(echo "$SOURCE_URL" | sed -nE 's#.*[?&]v=([A-Za-z0-9_-]+).*#\1#p')"
            fi

            if [ -n "$VIDEO_ID" ]; then
              WORK_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            fi
          elif echo "$LOWER_URL" | grep -Eq "(facebook\.com|fb\.watch)"; then
            PLATFORM="facebook"
            REFERER_URL="https://www.facebook.com/"
          elif echo "$LOWER_URL" | grep -Eq "(instagram\.com)"; then
            PLATFORM="instagram"
            REFERER_URL="https://www.instagram.com/"
          elif echo "$LOWER_URL" | grep -Eq "(tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com)"; then
            PLATFORM="tiktok"
            REFERER_URL="https://www.tiktok.com/"
          elif echo "$LOWER_URL" | grep -Eq "(twitter\.com|x\.com)"; then
            PLATFORM="x"
            REFERER_URL="https://x.com/"
          elif echo "$LOWER_URL" | grep -Eq "(reddit\.com|redd\.it)"; then
            PLATFORM="reddit"
            REFERER_URL="https://www.reddit.com/"
          fi

          echo "SLOT=$SLOT"
          echo "PLATFORM=$PLATFORM"
          echo "ORIGINAL_URL=$SOURCE_URL"
          echo "NORMALIZED_URL=$WORK_URL"
          echo "MAX_HEIGHT=$MAX_HEIGHT"
          echo "REFERER_URL=$REFERER_URL"

          {
            echo "PLATFORM=${PLATFORM}"
            echo "NORMALIZED_URL=${WORK_URL}"
          } >> "$STATUS_FILE"

          COOKIES_ARGS=()

          if [ "$IS_YOUTUBE" = "1" ] && [ -n "${YOUTUBE_COOKIES_TXT:-}" ]; then
            COOKIES_FILE="$RUNNER_TEMP/youtube-cookies.txt"
            umask 077
            printf '%s\n' "$YOUTUBE_COOKIES_TXT" > "$COOKIES_FILE"
            sed -i 's/\r$//' "$COOKIES_FILE"

            COOKIE_BYTES="$(wc -c < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_LINES="$(wc -l < "$COOKIES_FILE" | tr -d ' ')"
            COOKIE_YOUTUBE_LINES="$(grep -Ei 'youtube\.com|google\.com' "$COOKIES_FILE" | wc -l | tr -d ' ')"
            COOKIE_HAS_NETSCAPE="$(grep -E '^# Netscape HTTP Cookie File' "$COOKIES_FILE" >/dev/null 2>&1 && echo yes || echo no)"

            COOKIES_ARGS=(--cookies "$COOKIES_FILE")

            echo "YOUTUBE_COOKIES=enabled"
            echo "COOKIE_BYTES=${COOKIE_BYTES}"
            echo "COOKIE_LINES=${COOKIE_LINES}"
            echo "COOKIE_YOUTUBE_OR_GOOGLE_LINES=${COOKIE_YOUTUBE_LINES}"
            echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"

            {
              echo "YOUTUBE_COOKIES=enabled"
              echo "COOKIE_BYTES=${COOKIE_BYTES}"
              echo "COOKIE_LINES=${COOKIE_LINES}"
              echo "COOKIE_YOUTUBE_OR_GOOGLE_LINES=${COOKIE_YOUTUBE_LINES}"
              echo "COOKIE_HAS_NETSCAPE_HEADER=${COOKIE_HAS_NETSCAPE}"
            } >> "$STATUS_FILE"
          else
            echo "YOUTUBE_COOKIES=disabled"
            echo "YOUTUBE_COOKIES=disabled" >> "$STATUS_FILE"
          fi

          EXTRACTOR_ARGS=()
          YOUTUBE_CLIENT="none"

          if [ "$IS_YOUTUBE" = "1" ]; then
            case "$SLOT" in
              1)
                YOUTUBE_CLIENT="default"
                EXTRACTOR_ARGS=()
                ;;
              2)
                YOUTUBE_CLIENT="mweb"
                EXTRACTOR_ARGS=(--extractor-args "youtube:player_client=mweb")
                ;;
              3)
                YOUTUBE_CLIENT="tv"
                EXTRACTOR_ARGS=(--extractor-args "youtube:player_client=tv")
                ;;
              4)
                YOUTUBE_CLIENT="ios"
                EXTRACTOR_ARGS=(--extractor-args "youtube:player_client=ios")
                ;;
            esac

            echo "YOUTUBE_CLIENT=$YOUTUBE_CLIENT"
            echo "YOUTUBE_CLIENT=$YOUTUBE_CLIENT" >> "$STATUS_FILE"
          fi

          echo ""
          echo "=============================="
          echo "SLOT=${SLOT} LIST_FORMATS_DIAGNOSTIC"
          echo "=============================="

          set +e
          python3 -m yt_dlp \
            --no-playlist \
            --force-ipv4 \
            --geo-bypass \
            --socket-timeout 20 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --referer "$REFERER_URL" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --list-formats \
            "${COOKIES_ARGS[@]}" \
            "${EXTRACTOR_ARGS[@]}" \
            "$WORK_URL" > "work/formats-slot-${SLOT}.log" 2>&1
          LF_RC=$?
          set -e

          echo "LIST_FORMATS_RC=${LF_RC}"
          cat "work/formats-slot-${SLOT}.log" || true

          {
            echo "LIST_FORMATS_RC=${LF_RC}"
          } >> "$STATUS_FILE"

          HEIGHTS=""

          if [ "$MAX_HEIGHT" -ge 2160 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 2160"
          fi

          if [ "$MAX_HEIGHT" -ge 1440 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1440"
          fi

          if [ "$MAX_HEIGHT" -ge 1080 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 1080"
          fi

          if [ "$MAX_HEIGHT" -ge 720 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 720"
          fi

          if [ "$MAX_HEIGHT" -ge 480 ] 2>/dev/null; then
            HEIGHTS="$HEIGHTS 480"
          fi

          HEIGHTS="$HEIGHTS 360"

          SUCCESS=0

          for HEIGHT in $HEIGHTS; do
            echo ""
            echo "=============================="
            echo "SLOT=${SLOT} TRY_HEIGHT=${HEIGHT}"
            echo "=============================="

            rm -f work/video.*

            if [ "$IS_YOUTUBE" = "1" ]; then
              FORMAT_SELECTOR="bv*[height<=${HEIGHT}]+ba/b[height<=${HEIGHT}]/b/best"
            else
              FORMAT_SELECTOR="bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/bestvideo+bestaudio/best"
            fi

            echo "FORMAT_SELECTOR=${FORMAT_SELECTOR}"

            set +e
            python3 -m yt_dlp \
              --no-playlist \
              --no-warnings \
              --force-ipv4 \
              --geo-bypass \
              --socket-timeout 20 \
              --retries 1 \
              --fragment-retries 1 \
              --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
              --merge-output-format mp4 \
              --remux-video mp4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --referer "$REFERER_URL" \
              --add-header "Accept-Language:en-US,en;q=0.9" \
              --max-filesize 47M \
              -f "$FORMAT_SELECTOR" \
              -o "work/video.%(ext)s" \
              "${COOKIES_ARGS[@]}" \
              "${EXTRACTOR_ARGS[@]}" \
              "$WORK_URL" > "work/yt-dlp-slot-${SLOT}-${HEIGHT}.log" 2>&1
            RC=$?
            set -e

            cat "work/yt-dlp-slot-${SLOT}-${HEIGHT}.log"

            FILE="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

            if [ "$RC" -eq 0 ] && [ -n "$FILE" ] && [ -f "$FILE" ]; then
              SIZE_BYTES="$(stat -c%s "$FILE")"

              echo "DOWNLOAD_SUCCESS_HEIGHT=${HEIGHT}"
              echo "Downloaded file: $FILE"
              echo "Size bytes: $SIZE_BYTES"

              if [ "$SIZE_BYTES" -le 0 ]; then
                echo "Downloaded file is empty. Trying lower height."
                rm -f "$FILE"
                continue
              fi

              if [ "$SIZE_BYTES" -gt "$MAX_FILE_BYTES" ]; then
                echo "File is too large. Trying lower height."
                rm -f "$FILE"
                continue
              fi

              mv "$FILE" "work/video-${SLOT}.mp4"

              {
                echo "RESULT=success"
                echo "SUCCESS_PLATFORM=${PLATFORM}"
                echo "SUCCESS_HEIGHT=${HEIGHT}"
                echo "SUCCESS_SIZE_BYTES=${SIZE_BYTES}"
              } >> "$STATUS_FILE"

              echo "ATTEMPT_SUCCESS=SLOT_${SLOT}"
              echo "SUCCESS_PLATFORM=$PLATFORM"
              echo "SUCCESS_HEIGHT=$HEIGHT"
              echo "SUCCESS_SIZE_BYTES=$SIZE_BYTES"

              SUCCESS=1
              break
            fi

            echo "HEIGHT_FAILED=${HEIGHT} RC=$RC"
          done

          if [ "$SUCCESS" -eq 1 ]; then
            exit 0
          fi

          echo ""
          echo "=============================="
          echo "SLOT=${SLOT} FALLBACK_DEFAULT_DOWNLOAD"
          echo "=============================="

          rm -f work/video.*

          set +e
          python3 -m yt_dlp \
            --no-playlist \
            --no-warnings \
            --force-ipv4 \
            --geo-bypass \
            --socket-timeout 20 \
            --retries 1 \
            --fragment-retries 1 \
            --concurrent-fragments "$CONCURRENT_FRAGMENTS" \
            --merge-output-format mp4 \
            --remux-video mp4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --referer "$REFERER_URL" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --max-filesize 47M \
            -S "res:${MAX_HEIGHT},ext:mp4:m4a" \
            -o "work/video.%(ext)s" \
            "${COOKIES_ARGS[@]}" \
            "${EXTRACTOR_ARGS[@]}" \
            "$WORK_URL" > "work/fallback-slot-${SLOT}.log" 2>&1
          FB_RC=$?
          set -e

          echo "FALLBACK_RC=${FB_RC}"
          cat "work/fallback-slot-${SLOT}.log" || true

          FILE="$(find work -maxdepth 1 -type f -name "video.*" | head -n 1 || true)"

          if [ "$FB_RC" -eq 0 ] && [ -n "$FILE" ] && [ -f "$FILE" ]; then
            SIZE_BYTES="$(stat -c%s "$FILE")"

            echo "FALLBACK_SUCCESS_SIZE_BYTES=${SIZE_BYTES}"

            if [ "$SIZE_BYTES" -gt 0 ] && [ "$SIZE_BYTES" -le "$MAX_FILE_BYTES" ]; then
              mv "$FILE" "work/video-${SLOT}.mp4"

              {
                echo "RESULT=success"
                echo "SUCCESS_PLATFORM=${PLATFORM}"
                echo "SUCCESS_HEIGHT=fallback"
                echo "SUCCESS_SIZE_BYTES=${SIZE_BYTES}"
              } >> "$STATUS_FILE"

              echo "ATTEMPT_SUCCESS=SLOT_${SLOT}"
              echo "SUCCESS_PLATFORM=$PLATFORM"
              echo "SUCCESS_HEIGHT=fallback"
              echo "SUCCESS_SIZE_BYTES=$SIZE_BYTES"

              exit 0
            fi
          fi

          {
            echo "FALLBACK_RC=${FB_RC}"
            echo "RESULT=failed"
            echo "REASON=all_methods_failed"
          } >> "$STATUS_FILE"

          echo "ATTEMPT_FAILED=SLOT_${SLOT}"
          echo "PLATFORM=$PLATFORM"
          echo "ALL_METHODS_FAILED=1"

          exit 0

      - name: Upload probe result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-slot-${{ matrix.slot }}
          path: |
            work/status-${{ matrix.slot }}.txt
            work/video-${{ matrix.slot }}.mp4
            work/*.log
          if-no-files-found: error
          retention-days: 1

  verify_result:
    name: Verify at least one download
    runs-on: ubuntu-latest
    needs: probe_video
    if: always()

    steps:
      - name: Download probe artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: probe-slot-*
          path: collected
          merge-multiple: true

      - name: Check result
        shell: bash
        run: |
          set -e

          echo "Collected files:"
          find collected -type f -maxdepth 2 -print | sort || true

          echo ""
          echo "Status files:"
          cat collected/status-*.txt || true

          echo ""
          echo "Formats diagnostics summary:"
          for f in collected/formats-slot-*.log; do
            [ -f "$f" ] || continue
            echo ""
            echo "----- ${f} -----"
            grep -Ei 'Available formats|ID +EXT|mp4|webm|m4a|storyboard|images|missing|SABR|PO Token|DRM|ERROR|WARNING' "$f" | head -n 80 || true
          done

          echo ""
          echo "Fallback diagnostics summary:"
          for f in collected/fallback-slot-*.log; do
            [ -f "$f" ] || continue
            echo ""
            echo "----- ${f} -----"
            grep -Ei 'Downloading|Destination|Merging|ERROR|WARNING|has already been downloaded|size|format|Requested' "$f" | head -n 80 || true
          done

          VIDEO_COUNT="$(find collected -type f -name 'video-*.mp4' -size +0c | wc -l | tr -d ' ')"

          echo ""
          echo "VIDEO_COUNT=${VIDEO_COUNT}"

          if [ "$VIDEO_COUNT" -ge 1 ]; then
            echo "FINAL_RESULT=success"
            exit 0
          fi

          echo "FINAL_RESULT=failed"
          exit 1
